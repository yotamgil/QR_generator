<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --mint: #B8E8D8;
    --mint-deep: #7ECFBC;
    --mint-light: #E1F5EE;
    --teal: #1D9E75;
    --teal-dark: #0F6E56;
    --coral: #E8A090;
    --coral-dark: #C97862;
    --yellow: #F0E060;
    --yellow-dark: #D4C430;
    --lavender: #D4C8F0;
    --sky: #A8D8F0;
    --sand: #F5EDD8;
    --pink: #F4C0D1;
    --text-dark: #1A3A30;
    --text-mid: #3C6E5E;
    --text-muted: #6A9E8E;
  }

  html, body {
    min-height: 100vh;
    font-family: 'Courier New', Courier, monospace;
    background: var(--sky);
    overflow-x: hidden;
  }

  /* ── BACKGROUND GEOMETRY ── */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: var(--sky);
    overflow: hidden;
  }
  .bg-block { position: absolute; }
  .bg-floor  { bottom: 0; left: 0; right: 0; height: 42%; background: #E8F8F0; }
  .bg-pool   { bottom: 0; left: 0; right: 0; height: 26%; background: #78CCE8; }
  .bg-wall-l { top: 0; left: 0; width: 22%; height: 70%; background: #E8A090; }
  .bg-wall-r { top: 0; right: 0; width: 18%; height: 58%; background: var(--lavender); }
  .bg-block-a { top: 30%; right: 18%; width: 120px; height: 90px; background: var(--pink); }
  .bg-block-b { top: 0; left: 22%; width: 40%; height: 12px; background: var(--coral); }
  .bg-step-1 { bottom: 26%; right: 0; width: 18%; height: 10px; background: var(--mint); }
  .bg-step-2 { bottom: calc(26% + 10px); right: 0; width: 12%; height: 10px; background: var(--mint-deep); }
  .bg-step-3 { bottom: calc(26% + 20px); right: 0; width: 7%; height: 10px; background: var(--teal); }
  .bg-tile-line { position: absolute; bottom: 0; left: 0; right: 0; height: 26%; pointer-events: none; }

  /* pool tile lines */
  .pool-lines { position: absolute; bottom: 0; left: 0; right: 0; height: 26%; }
  .pool-lines::before, .pool-lines::after {
    content: ''; position: absolute; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.25);
  }
  .pool-lines::before { bottom: 33%; }
  .pool-lines::after  { bottom: 66%; }

  /* reflection shimmer */
  .shimmer {
    position: absolute; bottom: 6%; left: 50%; transform: translateX(-50%);
    width: 60px; height: 6px; background: rgba(255,255,255,0.55);
    border-radius: 3px; animation: shim 2.8s ease-in-out infinite;
  }
  @keyframes shim { 0%,100%{opacity:.4;width:60px} 50%{opacity:.9;width:90px} }

  /* ── LAYOUT ── */
  .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1rem; }

  /* ── HEADER ── */
  .header { text-align: center; margin-bottom: 2.5rem; }
  .header-eyebrow { font-family: 'Courier New', Courier, monospace; font-size: 11px; letter-spacing: 0.18em; color: var(--teal-dark); text-transform: uppercase; margin-bottom: 10px; opacity: 0.85; }
  .header-title {
    font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
    font-size: clamp(3rem, 8vw, 5.5rem);
    color: var(--text-dark);
    line-height: 1.0;
    letter-spacing: -0.02em;
  }
  .header-title span { color: var(--coral-dark); }

  /* ── CARD ── */
  .card {
    width: 100%; max-width: 520px;
    background: var(--mint);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 6px 6px 0 var(--teal-dark);
  }
  .card-stripe { height: 12px; background: var(--coral); }
  .card-body { padding: 2rem 2rem 2.5rem; }

  /* ── FORM ── */
  .field { margin-bottom: 1.25rem; }
  .field-label {
    display: block; font-size: 10px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--teal-dark); margin-bottom: 6px;
  }
  .field-inner {
    background: var(--mint-deep); border-radius: 12px; padding: 3px;
  }
  .field-inner input {
    width: 100%; background: #A8DED1; border: none; border-radius: 9px;
    padding: 11px 14px; font-size: 14px; font-family: 'Courier New', Courier, monospace;
    color: var(--text-dark); outline: none;
  }
  .field-inner input::placeholder { color: var(--text-muted); }
  .field-inner input:focus { background: #C0EAE0; }

  .generate-btn {
    width: 100%; padding: 14px; border: none; border-radius: 14px;
    background: var(--yellow); font-family: 'Courier New', Courier, monospace;
    font-size: 14px; font-weight: 500; letter-spacing: 0.08em;
    color: #3A2E00; cursor: pointer; margin-top: 0.5rem;
    box-shadow: 3px 3px 0 var(--yellow-dark);
    transition: transform 0.1s, box-shadow 0.1s;
    text-transform: uppercase;
  }
  .generate-btn:hover { background: #EDD830; }
  .generate-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--yellow-dark); }

  .err-msg { font-size: 12px; color: #8B2020; margin-top: 8px; text-align: center; display: none; }

  /* ── RESULT ── */
  .result {
    margin-top: 1.75rem; background: var(--mint-light);
    border-radius: 18px; border: 1px solid var(--mint-deep);
    padding: 1.75rem; display: none; flex-direction: column;
    align-items: center; gap: 14px;
  }
  .result-headline { font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif; font-size: 20px; color: var(--text-dark); text-align: center; }
  .result-qr { background: #fff; border-radius: 12px; padding: 10px; display: inline-block; }
  .result-url { font-size: 11px; color: var(--text-muted); text-align: center; word-break: break-all; max-width: 280px; }

  .dl-btn {
    padding: 10px 28px; border: none; border-radius: 10px;
    background: var(--coral); font-family: 'Courier New', Courier, monospace;
    font-size: 12px; font-weight: 500; letter-spacing: 0.06em;
    color: #3A1008; cursor: pointer; text-transform: uppercase;
    box-shadow: 2px 2px 0 var(--coral-dark);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .dl-btn:hover { background: #DFAA9C; }
  .dl-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--coral-dark); }

  /* ── SIDE ACCENT ── */
  .card-wrap { position: relative; display: inline-block; width: 100%; max-width: 520px; }
  .side-strip {
    position: absolute; right: -14px; top: 14px; bottom: -14px;
    width: 14px; background: var(--teal); border-radius: 0 10px 10px 0; z-index: -1;
  }
  .bottom-strip {
    position: absolute; left: 14px; right: -14px; bottom: -14px;
    height: 14px; background: var(--teal); border-radius: 0 0 10px 0; z-index: -1;
  }

  /* ── FOOTER ── */
  .footer { margin-top: 3rem; font-size: 11px; color: var(--teal-dark); letter-spacing: 0.1em; opacity: 0.7; text-align: center; }

  /* ── DECORATIVE DOTS ── */
  .dot-grid { position: absolute; top: 2rem; right: 2rem; display: grid; grid-template-columns: repeat(5,10px); gap: 6px; opacity: 0.4; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--teal-dark); }
</style>
</head>
<body>

<div class="bg">
  <div class="bg-block bg-wall-l"></div>
  <div class="bg-block bg-wall-r"></div>
  <div class="bg-block bg-block-a"></div>
  <div class="bg-block bg-block-b"></div>
  <div class="bg-block bg-floor"></div>
  <div class="bg-block bg-pool"></div>
  <div class="pool-lines"></div>
  <div class="bg-block bg-step-1"></div>
  <div class="bg-block bg-step-2"></div>
  <div class="bg-block bg-step-3"></div>
  <div class="shimmer"></div>
</div>

<div class="page">

  <div class="dot-grid">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <header class="header">
    <p class="header-eyebrow">Instant QR generator</p>
    <h1 class="header-title">QR <span>Studio</span></h1>
  </header>

  <div class="card-wrap">
    <div class="side-strip"></div>
    <div class="bottom-strip"></div>
    <div class="card">
      <div class="card-stripe"></div>
      <div class="card-body">

        <div class="field">
          <label class="field-label" for="qr-input">URL or text</label>
          <div class="field-inner">
            <input type="text" id="qr-input" placeholder="https://example.com" />
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="qr-headline">Headline (optional)</label>
          <div class="field-inner">
            <input type="text" id="qr-headline" placeholder="Your headline here" />
          </div>
        </div>

        <button class="generate-btn" onclick="generateQR()">Generate QR code</button>
        <p class="err-msg" id="qr-err">Please enter a URL or text first.</p>

        <div class="result" id="qr-result">
          <p class="result-headline" id="qr-headline-out"></p>
          <div class="result-qr" id="qr-canvas-wrap"></div>
          <p class="result-url" id="qr-url-out"></p>
          <div class="btn-row">
            <button class="dl-btn" onclick="downloadQR()">Download PNG</button>
            <button class="dl-btn copy-btn" id="copy-btn" onclick="copyQR()">Copy Image</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <p class="footer">Scan with any camera app &mdash; no app required</p>

</div>

function overlayHamster(canvas, callback) {
  const size = canvas.width;
  const logoSize = Math.round(size * 0.22);
  const logoX = Math.round((size - logoSize) / 2);
  const logoY = Math.round((size - logoSize) / 2);

  const off = document.createElement('canvas');
  off.width = size; off.height = size;
  const ctx = off.getContext('2d');
  ctx.drawImage(canvas, 0, 0);

  // white circle background
  const r = logoSize / 2 + 4;
  ctx.beginPath();
  ctx.arc(size/2, size/2, r, 0, Math.PI*2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, logoX, logoY, logoSize, logoSize);
    callback(off);
  };
  img.src = HAMSTER_SRC;
}

function generateQR() {
  const text = document.getElementById('qr-input').value.trim();
  const headline = document.getElementById('qr-headline').value.trim();
  const err = document.getElementById('qr-err');
  const result = document.getElementById('qr-result');
  const wrap = document.getElementById('qr-canvas-wrap');
  const headlineOut = document.getElementById('qr-headline-out');
  const urlOut = document.getElementById('qr-url-out');

  err.style.display = 'none';
  result.style.display = 'none';
  if (!text) { err.style.display = 'block'; return; }

  wrap.innerHTML = '';
  try {
    new QRCode(wrap, {
      text, width: 200, height: 200,
      colorDark: '#0F6E56', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    // Wait for QRCode to render then overlay hamster
    setTimeout(() => {
      const canvas = wrap.querySelector('canvas');
      if (canvas) {
        overlayHamster(canvas, (overlaid) => {
          // Replace canvas with overlaid version
          wrap.innerHTML = '';
          wrap.appendChild(overlaid);
        });
      }
    }, 80);

    headlineOut.textContent = headline;
    headlineOut.style.display = headline ? 'block' : 'none';
    urlOut.textContent = text;
    result.style.display = 'flex';
  } catch(e) {
    err.textContent = 'Could not generate. Try shorter input.';
    err.style.display = 'block';
  }
}

function downloadQR() {
  const canvas = document.querySelector('#qr-canvas-wrap canvas');
  const headline = document.getElementById('qr-headline').value.trim();
  if (!canvas) return;

  if (!headline) {
    const a = document.createElement('a'); a.href = canvas.toDataURL('image/png'); a.download = 'qrcode.png'; a.click(); return;
  }

  const pad = 24, fs = 20, gap = 14, sz = 200;
  const off = document.createElement('canvas');
  off.width = sz + pad * 2;
  off.height = sz + fs + gap + pad * 2;
  const ctx = off.getContext('2d');
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, off.width, off.height);
  ctx.fillStyle = '#0F6E56';
  ctx.font = `500 ${fs}px "Courier New", Courier, monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(headline, off.width / 2, pad + fs);
  ctx.drawImage(canvas, pad, pad + fs + gap, sz, sz);
  const a = document.createElement('a'); a.href = off.toDataURL('image/png'); a.download = 'qrcode.png'; a.click();
}


async function copyQR() {
  const canvas = document.querySelector('#qr-canvas-wrap canvas');
  if (!canvas) return;
  try {
    canvas.toBlob(async (blob) => {
      const item = new ClipboardItem({ 'image/png': blob });
      await navigator.clipboard.write([item]);
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy Image'; btn.classList.remove('copied'); }, 2000);
    });
  } catch(e) {
    alert('Copy not supported in this browser. Use Download instead.');
  }
}
document.getElementById('qr-input').addEventListener('keydown', e => { if (e.key === 'Enter') generateQR(); });
